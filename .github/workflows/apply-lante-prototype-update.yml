name: Apply Lante prototype update

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-lante-prototype-update.yml
      - .github/lante-current.patch.gz.b64

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply latest prototype patch
        shell: bash
        run: |
          set -euo pipefail
          python3 -c "from pathlib import Path; import base64,gzip; s=''.join(Path('.github/lante-current.patch.gz.b64').read_text().split()); raw=base64.b64decode(s + '=' * (-len(s) % 4)); Path('/tmp/lante-current.patch').write_bytes(gzip.decompress(raw))"
          git apply --check /tmp/lante-current.patch
          git apply --whitespace=nowarn /tmp/lante-current.patch
          git status --short
      - name: Validate HTML scripts
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re, subprocess
          for source in ['web/index.html', 'mobile/index.html']:
              html = Path(source).read_text(encoding='utf-8')
              blocks = re.findall(r'<script>(.*?)</script>', html, flags=re.S)
              if not blocks:
                  raise SystemExit(f'missing script block in {source}')
              for i, code in enumerate(blocks, 1):
                  p = Path('/tmp') / f'{source.replace("/", "-")}-{i}.js'
                  p.write_text(code, encoding='utf-8')
                  subprocess.run(['node', '--check', str(p)], check=True)
          PY
      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/index.html mobile/index.html
          if git diff --cached --quiet; then
            echo "No prototype changes to commit."
            exit 0
          fi
          git commit -m "Apply Lante prototype updates"
          git push origin main
